name: Test

on:
  pull_request:

jobs:
  prepare:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version:
          - 1.x

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Use Go ${{ matrix.go-version }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: vendor
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod vendor

  test:
    runs-on: ubuntu-latest
    needs:
      - prepare
    strategy:
      matrix:
        go-version:
          - 1.x
        package:
          - .
          - ./pkg/app
          - ./pkg/command
          - ./pkg/config
          - ./pkg/env
          - ./pkg/service

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Use Go ${{ matrix.go-version }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Restore Go modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: vendor
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-
            ${{ runner.os }}-go-

      - name: go test
        run: go test -v ${{ matrix.package }}

  vet:
    runs-on: ubuntu-latest
    needs:
      - prepare
    strategy:
      matrix:
        go-version:
          - 1.x
        package:
          - .
          - ./pkg/app
          - ./pkg/command
          - ./pkg/config
          - ./pkg/env
          - ./pkg/service

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Use Go ${{ matrix.go-version }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Restore Go modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: vendor
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-
            ${{ runner.os }}-go-

      - name: go vet
        run: go vet ${{ matrix.package }}

  gofmt:
    runs-on: ubuntu-latest
    needs:
      - prepare
    strategy:
      matrix:
        go-version:
          - 1.x
        package:
          - .
          - ./pkg/app
          - ./pkg/command
          - ./pkg/config
          - ./pkg/env
          - ./pkg/service

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Use Go ${{ matrix.go-version }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Restore Go modules cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: vendor
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-
            ${{ runner.os }}-go-

      - name: gofmt
        run: gofmt -e -l -w ${{ matrix.package }}

      - name: Check diff
        run: git diff --exit-code
